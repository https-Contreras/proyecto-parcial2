<div class="px-16 py-12 min-h-screen" style="background-color: #e1e5f2;">
    <div class="mb-8">
        <h1 class="text-3xl font-bold" style="color: #022b3a;">Inventario de Equipos</h1>
        <p class="mt-1 text-sm" style="color: #47bfd7;">{{ equiposFiltrados().length }} equipos encontrados</p>
    </div>

    <!-- Filtros -->
    <div class="flex gap-3 mb-10 flex-wrap">
        <button (click)="filtrarTodos()"
            class="px-4 py-2 rounded-full text-sm font-medium transition hover:opacity-90 cursor-pointer"
            [style.background-color]="filtroActivo() === 'todos' ? '#022b3a' : '#ffffff'"
            [style.color]="filtroActivo() === 'todos' ? '#ffffff' : '#022b3a'">
            Ver Todos
        </button>
        <button (click)="filtrarPorTipo('Laptop')"
            class="px-4 py-2 rounded-full text-sm font-medium transition hover:opacity-90 cursor-pointer"
            [style.background-color]="filtroActivo() === 'Laptop' ? '#022b3a' : '#ffffff'"
            [style.color]="filtroActivo() === 'Laptop' ? '#ffffff' : '#022b3a'">
            💻 Laptops
        </button>
        <button (click)="filtrarPorTipo('Servidor')"
            class="px-4 py-2 rounded-full text-sm font-medium transition hover:opacity-90 cursor-pointer"
            [style.background-color]="filtroActivo() === 'Servidor' ? '#022b3a' : '#ffffff'"
            [style.color]="filtroActivo() === 'Servidor' ? '#ffffff' : '#022b3a'">
            🖥️ Servidores
        </button>
        <button (click)="filtrarPorEstado('Disponible')"
            class="px-4 py-2 rounded-full text-sm font-medium transition hover:opacity-90 cursor-pointer"
            [style.background-color]="filtroActivo() === 'Disponible' ? '#47bfd7' : '#ffffff'"
            [style.color]="filtroActivo() === 'Disponible' ? '#ffffff' : '#022b3a'">
            ✅ Disponibles
        </button>
        <button (click)="filtrarPorEstado('Asignado')"
            class="px-4 py-2 rounded-full text-sm font-medium transition hover:opacity-90 cursor-pointer"
            [style.background-color]="filtroActivo() === 'Asignado' ? '#fc2bb6' : '#ffffff'"
            [style.color]="filtroActivo() === 'Asignado' ? '#ffffff' : '#022b3a'">
            🔴 Asignados
        </button>
    </div>

    <!-- Grid de tarjetas -->
    <div class="grid grid-cols-3 gap-6">
        @for (equipo of equiposFiltrados(); track equipo.id) {
        <app-tarjeta-equipo [equipo]="equipo" (clickDetalle)="irDetalle($event)">
        </app-tarjeta-equipo>
        }
    </div>

    @if (equiposFiltrados().length === 0) {
    <div class="text-center py-20">
        <p class="text-2xl">😕</p>
        <p class="mt-2 text-gray-500">No hay equipos con ese filtro.</p>
    </div>
    }
</div>
