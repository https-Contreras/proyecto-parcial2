<div class="px-6 sm:px-16 py-12 min-h-screen" style="background-color: #f1f5f9;">
    <div class="max-w-7xl mx-auto">
        <div class="mb-10 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center border-b pb-6 border-gray-200">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight drop-shadow-sm" style="color: #022b3a;">Inventario de Equipos</h1>
                <p class="mt-2 text-md font-medium" style="color: #47bfd7;">📦 {{ equiposFiltrados().length }} equipos encontrados</p>
            </div>
            
            <button routerLink="/equipos/crear" class="mt-4 sm:mt-0 px-6 py-3 rounded-xl shadow-sm hover:shadow-md text-white font-bold transition-all duration-300 hover:-translate-y-1 hover:scale-105 active:scale-95" style="background-color: #fc2bb6;">
                + Instalar Equipo
            </button>
        </div>

        <!-- Filtros -->
        <div class="flex flex-wrap gap-4 mb-12 bg-white/50 p-4 rounded-3xl backdrop-blur-md shadow-sm border border-white">
            <button (click)="filtrarTodos()"
                class="px-5 py-2.5 rounded-2xl text-sm font-bold tracking-wide transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-md"
                [style.background-color]="filtroActivo() === 'todos' ? '#022b3a' : '#ffffff'"
                [style.color]="filtroActivo() === 'todos' ? '#ffffff' : '#022b3a'">
                Ver Todos
            </button>
            <button (click)="filtrarPorTipo('Laptop')"
                class="px-5 py-2.5 rounded-2xl text-sm w-max font-bold tracking-wide transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-md border border-gray-100"
                [style.background-color]="filtroActivo() === 'Laptop' ? '#022b3a' : '#ffffff'"
                [style.color]="filtroActivo() === 'Laptop' ? '#ffffff' : '#022b3a'">
                💻 Laptops
            </button>
            <button (click)="filtrarPorTipo('Servidor')"
                class="px-5 py-2.5 rounded-2xl text-sm w-max font-bold tracking-wide transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-md border border-gray-100"
                [style.background-color]="filtroActivo() === 'Servidor' ? '#022b3a' : '#ffffff'"
                [style.color]="filtroActivo() === 'Servidor' ? '#ffffff' : '#022b3a'">
                🖥️ Servidores
            </button>
            <button (click)="filtrarPorEstado('Disponible')"
                class="px-5 py-2.5 rounded-2xl text-sm w-max font-bold tracking-wide transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-md border border-gray-100"
                [style.background-color]="filtroActivo() === 'Disponible' ? '#47bfd7' : '#ffffff'"
                [style.color]="filtroActivo() === 'Disponible' ? '#ffffff' : '#022b3a'">
                ✅ Disponibles
            </button>
            <button (click)="filtrarPorEstado('Asignado')"
                class="px-5 py-2.5 rounded-2xl text-sm w-max font-bold tracking-wide transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-md border border-gray-100"
                [style.background-color]="filtroActivo() === 'Asignado' ? '#fc2bb6' : '#ffffff'"
                [style.color]="filtroActivo() === 'Asignado' ? '#ffffff' : '#022b3a'">
                🔴 Asignados
            </button>
        </div>

        <!-- Grid de tarjetas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            @for (equipo of equiposFiltrados(); track equipo.id) {
            <app-tarjeta-equipo [equipo]="equipo" 
                (clickDetalle)="irDetalle($event)"
                (clickEditar)="editarEquipo($event)"
                (clickEliminar)="eliminarEquipo($event)">
            </app-tarjeta-equipo>
            }
        </div>

        @if (equiposFiltrados().length === 0) {
        <div class="text-center py-32 bg-white/60 mt-8 rounded-3xl border border-dashed border-gray-300 mx-auto max-w-lg shadow-sm">
            <p class="text-6xl drop-shadow-sm mb-4">🕵️‍♂️</p>
            <p class="text-xl font-bold tracking-tight" style="color: #022b3a;">No se encontraron resultados.</p>
            <p class="mt-2 text-sm font-medium text-gray-500">Prueba con otro filtro o registra un equipo nuevo.</p>
        </div>
        }
    </div>
</div>
