<div class="px-16 py-12 min-h-screen" style="background-color: #e1e5f2;">
    <div class="mb-8">
        <h1 class="text-3xl font-bold" style="color: #022b3a;">Catálogo de Empleados</h1>
        <p class="mt-1 text-sm" style="color: #47bfd7;">{{ empleados.length }} empleados registrados</p>
    </div>

    <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full text-sm">
            <thead style="background-color: #022b3a; color: white;">
                <tr>
                    <th class="text-left px-6 py-4">#</th>
                    <th class="text-left px-6 py-4">Nombre</th>
                    <th class="text-left px-6 py-4">Departamento</th>
                    <th class="text-left px-6 py-4">Correo</th>
                    <th class="text-left px-6 py-4">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (empleado of empleados; track empleado.id; let i = $index) {
                <tr [class.bg-gray-50]="i % 2 !== 0" class="border-b border-gray-100 hover:bg-blue-50 transition">
                    <td class="px-6 py-4 text-gray-400">{{ empleado.id }}</td>
                    <td class="px-6 py-4 font-medium" style="color: #022b3a;">{{ empleado.nombre_completo }}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold"
                            style="background-color: #e1e5f2; color: #022b3a;">
                            {{ empleado.departamento }}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500">{{ empleado.correo }}</td>
                    <td class="px-6 py-4">
                        <button (click)="verDetalle(empleado.id)"
                            class="px-4 py-1 rounded-full text-white text-xs font-medium transition hover:opacity-90 cursor-pointer"
                            style="background-color: #fc2bb6;">
                            Ver Detalle
                        </button>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
